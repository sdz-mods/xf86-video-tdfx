# Example Xorg config for a 3dfx Voodoo4/5 (VSA-100) driving a 1920x1080 sink.
#
# Drop into /etc/X11/xorg.conf.d/ .  The explicit 148.5 MHz 1080p modeline is
# the timing the PLL fix locks cleanly (clean VGA + stable HDMI/DVI on cards
# with a TMDS encoder); PreferredMode makes it the default.  DefaultDepth 24
# enables the 24/32bpp path.  "Virtual 1920 1080" pins the framebuffer to the
# panel size so the default mode never pans, while leaving all other validated
# resolutions selectable via RandR.

Section "Monitor"
    Identifier "GFX"
    HorizSync  30-83
    VertRefresh 56-76
    # keep an explicit, known-good 1080p and make it the default
    Modeline "1920x1080" 148.50 1920 2008 2052 2200 1080 1084 1089 1125 +hsync +vsync
    Option "PreferredMode" "1920x1080"
EndSection

Section "Device"
    Identifier "Voodoo4"
    Driver "tdfx"
EndSection

Section "Screen"
    Identifier "Screen0"
    Device "Voodoo4"
    Monitor "GFX"
    DefaultDepth 24
    SubSection "Display"
        Depth 24
        Virtual 1920 1080
    EndSubSection
EndSection
